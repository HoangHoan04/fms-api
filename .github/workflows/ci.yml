name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage || '' }}
      duration: ${{ steps.duration.outputs.duration || '' }}

    steps:
      - name: Notify Telegram - In Progress
        if: github.event_name == 'push'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          COMMIT_SHA: ${{ github.sha || '' }}
        run: |
          MSG=$(echo "${COMMIT_MSG}" | head -n1 | tr -d '\r' | sed 's/[\"`$]//g')
          SHA_SHORT=$(echo ${COMMIT_SHA} | cut -c1-7)
          REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="<b>CI BUILD IN PROGRESS</b>

          <b>Dự án:</b>     ${REPO_NAME}
          <b>Nhân viên:</b> ${{ github.actor }}
          <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA_SHORT}</code>)
          <b>Commit:</b>    ${MSG}
          <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — in_progress"

      - uses: actions/checkout@v4

      - name: Record build start time
        run: echo "BUILD_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Linter
        run: yarn lint

      - name: Run Tests with Coverage
        id: coverage
        run: |
          yarn test --coverage --passWithNoTests 2>&1 | tee coverage-output.txt
          COVERAGE=$(grep -oP 'Lines\s*:\s*\K[\d.]+(?=%)' coverage-output.txt || echo "0")
          echo "coverage=${COVERAGE}%" >> $GITHUB_OUTPUT

      - name: Check coverage threshold
        if: always()
        env:
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
        run: |
          THRESHOLD=80
          COVERAGE_NUM=$(echo "${COVERAGE}" | sed 's/%//' | cut -d. -f1)
          if [ -n "$COVERAGE_NUM" ] && [ "$COVERAGE_NUM" != "0" ] && [ "$COVERAGE_NUM" -lt "$THRESHOLD" ] 2>/dev/null; then
            REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>COVERAGE DROPPED BELOW THRESHOLD</b>

            <b>Dự án:</b>     ${REPO_NAME}
            <b>Coverage:</b>  ${COVERAGE}
            <b>Ngưỡng:</b>   ${THRESHOLD}%"
          fi

      - name: Build Application
        run: yarn build

      - name: Check build duration
        id: duration
        if: always()
        run: |
          DURATION=$(($(date +%s) - BUILD_START_TIME))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          if [ $DURATION -gt 600 ]; then
            REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>SLOW BUILD DETECTED</b>

            <b>Dự án:</b>     ${REPO_NAME}
            <b>Nhánh:</b>     ${{ github.ref_name }}
            <b>Duration:</b>  ${DURATION}s
            <b>Threshold:</b>  600s (10 phút)"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && github.event_name == 'push'

    steps:
      - name: Prepare commit info
        id: info
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          COMMIT_SHA: ${{ github.sha || '' }}
        run: |
          echo "sha_short=$(echo ${COMMIT_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "msg_first=$(echo "${COMMIT_MSG}" | head -n1 | tr -d '\r' | sed 's/[\"`$]//g')" >> $GITHUB_OUTPUT
          echo "repo_name=$(echo '${{ github.repository }}' | cut -d/ -f2)" >> $GITHUB_OUTPUT

      - name: Notify Telegram - Success
        if: needs.build-and-test.result == 'success'
        env:
          SHA: ${{ steps.info.outputs.sha_short }}
          MSG: ${{ steps.info.outputs.msg_first }}
          REPO: ${{ steps.info.outputs.repo_name }}
          COVERAGE: ${{ needs.build-and-test.outputs.coverage }}
          DURATION: ${{ needs.build-and-test.outputs.duration }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="<b>CI BUILD SUCCESS</b>

          <b>Dự án:</b>     ${REPO}
          <b>Nhân viên:</b> ${{ github.actor }}
          <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA}</code>)
          <b>Commit:</b>    ${MSG}
          <b>Coverage:</b>  ${COVERAGE}
          <b>Duration:</b>  ${DURATION}
          <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — success"

      - name: Notify Telegram - Failure
        if: needs.build-and-test.result == 'failure'
        env:
          SHA: ${{ steps.info.outputs.sha_short }}
          MSG: ${{ steps.info.outputs.msg_first }}
          REPO: ${{ steps.info.outputs.repo_name }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="<b>CI BUILD FAILED</b>

          <b>Dự án:</b>     ${REPO}
          <b>Nhân viên:</b> ${{ github.actor }}
          <b>Nhánh:</b>     ${{ github.ref_name }} (<code>${SHA}</code>)
          <b>Commit:</b>    ${MSG}
          <b>Duration:</b>  ${{ needs.build-and-test.outputs.duration }}
          <b>Tiến trình:</b> Build and deloy ${{ github.ref_name }} — failure"
